services:
  - type: web
    name: ajarli-backend
    env: php
    plan: free
    buildCommand: "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        # Render provides this variable automatically
        value: https://ajarli-backend.onrender.com 
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_KEY
        generateValue: true
      # You will need to fill these in the Render Dashboard from Supabase
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
